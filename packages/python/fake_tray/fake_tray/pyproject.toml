[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "faketray"
version = "0.1.0"
description = "Minimal fake tray icon using Hatchling"
authors = [{name="TII (SSRC) and Ghaf contributors"}]
license = {text="Apache-2.0"}

dependencies = [
  "PyGObject",
  "dbus-python"
]

[project.scripts]
faketray = "faketray.main:main"

[tool.hatch.build]
packages = ["faketray"]  # Changed from "fake_tray" to "faketray"
