[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ghaf-virtiofs-tests"
version = "0.1.0"
description = "Integration tests for ghaf-virtiofs-tools"
readme = "README.md"
license = {text = "Apache-2.0"}
authors = [
    {name = "TII (SSRC) and the Ghaf contributors"},
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Testing",
    "Topic :: System :: Filesystems",
]
requires-python = ">=3.11"
dependencies = []

[project.scripts]
ghaf-virtiofs-test = "ghaf_virtiofs_tests.cli:main"
ghaf-virtiofs-test-runner = "ghaf_virtiofs_tests.runner:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ghaf_virtiofs_tests"]

[tool.uv]
dev-dependencies = []
